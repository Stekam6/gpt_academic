name: Create Conda Environment Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-activate-base: true
        activate-environment: ""

    - name: Create new Conda environment
      shell: bash -l {0}
      run: |
        conda create -n gpt python=3.11 -y
        conda activate gpt

    - name: Install requirements
      shell: bash -l {0}
      run: |
        conda activate gpt
        pip install -r requirements.txt

    - name: Install conda-pack
      shell: bash -l {0}
      run: |
        conda activate gpt
        conda install conda-pack -y

    - name: Pack conda environment
      shell: bash -l {0}
      run: |
        conda activate gpt
        conda pack -n gpt -o gpt.tar.gz

    - name: Create workspace zip
      shell: pwsh
      run: |
        mkdir workspace
        Get-ChildItem -Exclude "workspace" | Copy-Item -Destination workspace -Recurse
        Remove-Item -Path workspace/.git* -Recurse -Force -ErrorAction SilentlyContinue
        Copy-Item gpt.tar.gz workspace/ -Force

    - name: Upload packed files
      uses: actions/upload-artifact@v4
      with:
        name: gpt-academic-package
        path: workspace

  # ── NEU ──────────────────────────────────────────────────────────────────
  dynamic-detection:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Artifact laden (enthält requirements.txt + gpt.tar.gz)
      - name: Download workspace artifact
        uses: actions/download-artifact@v4
        with:
          name: gpt-academic-package
          path: ./workspace

      # Conda-Umgebung entpacken, damit Syft die installierten Pakete scannen kann
      - name: Unpack conda environment
        run: |
          mkdir -p ./conda-env
          tar -xzf ./workspace/gpt.tar.gz -C ./conda-env

      # Syft installieren
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      # Detector ausführen:
      # Argument 1 = Projektpfad (für requirements.txt-Scan)
      # Syft scannt intern ./conda-env (entpackte Umgebung mit allen pip-Paketen)
      - name: Run detector
        run: java -jar dynamicDetector/detectionSystem-1.0-SNAPSHOT-all.jar ./workspace

      # Ergebnisse speichern
      - name: Upload detection results
        uses: actions/upload-artifact@v4
        with:
          name: detection-results
          path: |
            dynamic-detection-results.xlsx
            sbom-output.json
